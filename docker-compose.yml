version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: decisionflow-db
    environment:
      POSTGRES_DB: decisionflow
      POSTGRES_USER: decisionflow
      POSTGRES_PASSWORD: decisionflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisionflow -d decisionflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: decisionflow-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://decisionflow:decisionflow@db:5432/decisionflow
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: decisionflow-frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
